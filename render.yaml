services:
  # Backend Laravel
  - type: web
    name: portal-monitoring-backend
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: PortalMonitoring
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: portal-monitoring-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: portal-monitoring-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: portal-monitoring-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: portal-monitoring-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: portal-monitoring-db
          property: password
      - key: FRONTEND_URL
        value: https://portal-monitoring-frontend.onrender.com

  # Frontend Vue 3
  - type: static
    name: portal-monitoring-frontend
    rootDir: portal-monitoring-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://portal-monitoring-backend.onrender.com/api

# Database PostgreSQL
databases:
  - name: portal-monitoring-db
    databaseName: portal_monitoring
    user: portal_user